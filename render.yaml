services:
  - type: web
    name: wechat-buddy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: WECHAT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
